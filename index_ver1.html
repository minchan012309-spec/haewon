<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교무실 호출 시스템 - 학생용</title>
    <style>
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-Regular.woff2') format('woff2');
            font-weight: 400;
        }
        * { font-family: 'Paperlogy', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 20px; background-color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 550px; position: relative; overflow: hidden; }
        .page { display: none; min-height: 450px; }
        .page.active { display: flex; flex-direction: column; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        h1 { font-size: 1.8rem; color: #1a202c; margin-bottom: 8px; }
        p.subtitle { color: #718096; margin-bottom: 24px; font-size: 1rem; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-opt { background: #f7fafc; border: 2px solid #edf2f7; padding: 12px; border-radius: 12px; font-size: 0.95rem; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-opt.selected { background: #ebf8ff; border-color: #3182ce; color: #3182ce; font-weight: bold; }
        
        input { width: 100%; padding: 14px; border: 2px solid #edf2f7; border-radius: 12px; font-size: 1rem; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #3182ce; }
        
        .warning { background: #fff5f5; color: #c53030; padding: 18px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 20px; border-left: 5px solid #fc8181; line-height: 1.6; }
        
        .btn-next { background: #3182ce; color: white; border: none; padding: 18px; border-radius: 16px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: auto; }
        .btn-next:disabled { background: #cbd5e0; cursor: not-allowed; }

        .check-container { margin: 40px auto; width: 80px; height: 80px; background: #3182ce; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .check-icon { width: 40px; height: 20px; border-left: 5px solid white; border-bottom: 5px solid white; transform: rotate(-45deg); margin-top: -5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="page1" class="page active">
        <h1 style="margin-top: 80px; text-align:center;">교무실 호출 시스템</h1>
        <p class="subtitle" style="text-align:center;">교무실에 들어가기 전 선생님을 호출해주세요.</p>
        <button class="btn-next" onclick="go(2)">호출하기 시작</button>
    </div>

    <div id="page2" class="page">
        <h1>선생님 선택</h1>
        <p class="subtitle">담당 선생님을 선택하세요.</p>
        <div class="grid" id="teacherGrid">
            <div class="btn-opt" onclick="sel('t','김국어')">김국어</div>
            <div class="btn-opt" onclick="sel('t','이수학')">이수학</div>
            <div class="btn-opt" onclick="sel('t','박영어')">박영어</div>
            <div class="btn-opt" onclick="sel('t','최과학')">최과학</div>
            <div class="btn-opt" onclick="sel('t','정정보')">정정보</div>
        </div>
        <button class="btn-next" id="n2" disabled onclick="go(3)">다음으로</button>
    </div>

    <div id="page3" class="page">
        <h1>정보 입력</h1>
        <div class="grid" id="classGrid" style="grid-template-columns: repeat(5,1fr);"></div>
        <div class="grid" id="numGrid" style="grid-template-columns: repeat(8,1fr); height: 110px; overflow-y:auto; border:1px solid #edf2f7; padding:5px; border-radius:10px;"></div>
        <input type="text" id="nameInp" placeholder="이름을 입력하세요" oninput="val3()">
        <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
            <div class="btn-opt" onclick="sel('p','질문')">질문</div>
            <div class="btn-opt" onclick="sel('p','제출')">제출</div>
            <div class="btn-opt" onclick="sel('p','기타')">기타</div>
        </div>
        <input type="text" id="etcInp" placeholder="사유를 직접 입력하세요" style="display:none" oninput="val3()">
        <button class="btn-next" id="n3" disabled onclick="go(4)">다음으로</button>
    </div>

    <div id="page4" class="page">
        <h1>주의사항 동의</h1>
        <div class="warning">
            <strong>🚨 경고</strong><br>
            장난으로 호출하거나 타인의 정보를 도용할 경우, CCTV 확인을 거쳐 학생선도위원회에 회부될 수 있음을 알립니다.
        </div>
        <label style="display:flex; align-items:center; gap:12px; cursor:pointer; font-size:1.1rem; padding:10px;">
            <input type="checkbox" id="agree" style="width:24px; height:24px;" onchange="val4()"> 내용을 숙지하였으며 동의합니다.
        </label>
        <button class="btn-next" id="n4" disabled onclick="submit()">호출 전송하기</button>
    </div>

    <div id="page5" class="page" style="text-align:center; justify-content:center;">
        <div class="check-container"><div class="check-icon"></div></div>
        <h1>호출 완료!</h1>
        <p class="subtitle" style="font-size:1.2rem;">선생님께서 확인하실 때까지<br>잠시만 밖에서 기다려 주세요.</p>
        <button class="btn-next" style="background:#edf2f7; color:#4a5568;" onclick="location.reload()">처음 화면으로</button>
    </div>
</div>

<script>
    let data = { g:'2', b:'', n:'', name:'', t:'', p:'' };
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyAX-64IIAjJmLS-GOf-dQ2X_qdsLasSqI1lnFeHJFaGZsohBN4a-U2RToE_nZ8mKdU/exec"; 

    function go(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById('page'+p).classList.add('active');
    }

    const cg = document.getElementById('classGrid');
    for(let i=1;i<=10;i++) cg.innerHTML += `<div class="btn-opt" onclick="sel('b','${i}')">${i}반</div>`;
    const ng = document.getElementById('numGrid');
    for(let i=1;i<=40;i++) ng.innerHTML += `<div class="btn-opt" onclick="sel('n','${i}')">${i}</div>`;

    function sel(k, v) {
        event.target.parentElement.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('selected'));
        event.target.classList.add('selected');
        data[k] = v;
        if(k==='t') document.getElementById('n2').disabled=false;
        if(k==='p') document.getElementById('etcInp').style.display = (v==='기타'?'block':'none');
        val3();
    }

    function val3() {
        data.name = document.getElementById('nameInp').value;
        let pFinal = data.p === '기타' ? document.getElementById('etcInp').value : data.p;
        const ok = data.b && data.n && data.name && pFinal;
        document.getElementById('n3').disabled = !ok;
    }

    function val4() { document.getElementById('n4').disabled = !document.getElementById('agree').checked; }

    function submit() {
        const studentId = `2${data.b.padStart(2,'0')}${data.n.padStart(2,'0')}`;
        const finalP = data.p === '기타' ? document.getElementById('etcInp').value : data.p;
        go(5);
        fetch(GAS_URL, {
            method: "POST",
            mode: 'no-cors', // GAS 보안 정책 대응
            body: JSON.stringify({ teacher: data.t, id: studentId, name: data.name, purpose: finalP })
        });
    }
</script>
</body>
</html>
