<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교무실 선생님 호출 시스템</title>
    <style>
        @font-face { font-family: 'Paperlogy'; src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-Regular.woff2') format('woff2'); }
        * { font-family: 'Paperlogy', sans-serif; margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#f8fafc; padding:20px; display:flex; flex-direction:column; justify-content:center; min-height:100vh; overflow-x:hidden; }
        .container { background:white; border-radius:30px; padding:30px; box-shadow:0 20px 40px rgba(0,0,0,0.05); max-width:450px; margin:0 auto; width:100%; position:relative; }
        h2 { font-size:1.8rem; font-weight:900; color:#0f172a; margin-bottom:10px; text-align:center; }
        p { color:#64748b; text-align:center; margin-bottom:25px; font-size:0.95rem; }
        label { display:block; font-weight:bold; color:#334155; margin-bottom:8px; font-size:0.9rem; padding-left:4px; }
        select, input { width:100%; padding:15px; border-radius:15px; border:2px solid #e2e8f0; background:#f8fafc; font-size:1rem; font-weight:bold; color:#0f172a; margin-bottom:20px; transition:all 0.3s; -webkit-appearance:none; }
        select:focus, input:focus { border-color:#2563eb; background:white; outline:none; }
        
        /* 약관 및 동의 체크박스 */
        .agreement-box { background:#f1f5f9; padding:15px; border-radius:15px; margin-bottom:25px; display:flex; align-items:center; gap:12px; cursor:pointer; }
        .agreement-box input[type="checkbox"] { width:22px; height:22px; margin-bottom:0; cursor:pointer; accent-color:#2563eb; -webkit-appearance:checkbox; }
        .agreement-text { font-size:0.85rem; color:#475569; font-weight:bold; line-height:1.4; }

        /* 3초 꾹 누르기 버튼 */
        .hold-btn { width:100%; padding:22px; border-radius:20px; border:none; background:#cbd5e1; color:white; font-size:1.3rem; font-weight:900; cursor:not-allowed; position:relative; overflow:hidden; transition:transform 0.1s; text-align:center; user-select:none; -webkit-user-select:none; }
        .hold-btn.ready { background:#2563eb; cursor:pointer; box-shadow:0 10px 20px rgba(37,99,235,0.2); }
        .hold-btn:active { transform:scale(0.98); }
        .progress-bar { position:absolute; left:0; top:0; height:100%; width:0%; background:rgba(255,255,255,0.25); transition:none; }

        /* 비디오 및 캔버스 숨김 처리 (백그라운드 촬영용) */
        #video, #canvas { display:none; width:320px; height:240px; }

        /* 완료 레이어 */
        #successLayer { position:absolute; top:0; left:0; width:100%; height:100%; background:white; border-radius:30px; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
        .success-icon { width:80px; height:80px; background:#2563eb; color:white; border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:3rem; font-weight:bold; margin-bottom:20px; box-shadow:0 10px 20px rgba(37,99,235,0.3); }
        .success-title { font-size:1.5rem; font-weight:900; color:#0f172a; margin-bottom:8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>교무실 호출 시스템</h2>
    <p>본인 확인 및 벨튀 방지를 위해 카메라 권한이 동의됩니다.</p>
    
    <label>호출하실 선생님</label>
    <select id="teacher">
        <option value="">선생님 선택</option>
        <option value="최과학">최과학 선생님</option>
        <option value="김국어">김국어 선생님</option>
    </select>
    
    <label>본인 학번 (5자리)</label>
    <input type="number" id="studentId" placeholder="예: 20309" pattern="\d*">
    
    <label>본인 이름</label>
    <input type="text" id="studentName" placeholder="예: 홍길동">
    
    <label>방문 목적</label>
    <select id="purpose">
        <option value="제출">물품 및 과제 제출</option>
        <option value="질문">학습 및 교과 질문</option>
        <option value="상담">개인 및 진로 상담</option>
        <option value="호출">선생님 호출로 방문</option>
    </select>
    
    <div class="agreement-box" onclick="toggleCheck()">
        <input type="checkbox" id="agree" onclick="event.stopPropagation(); setupCamera();">
        <div class="agreement-text">벨튀 방지를 위한 전면 카메라 자동 촬영 및 정보 오남용 차단 약관에 동의합니다.</div>
    </div>
    
    <button id="submitBtn" class="hold-btn" onmousedown="startHold(event)" onmouseup="endHold()" onmouseleave="endHold()" ontouchstart="startHold(event)" ontouchend="endHold()">호출 버튼을 3초간 꾹 누르세요</button>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="successLayer">
        <div class="success-icon">✓</div>
        <div class="success-title">호출 전송 완료</div>
        <div style="color:#64748b; font-weight:bold;">대시보드에 실시간 로드 중...</div>
    </div>
</div>

<script>
    // 🌟 본인의 구글 웹앱 URL 주소 입력
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxLbald6YsDtbJbUOLfT5C4dqdSMIxuVi6HyAy750zz9fyV-Lib8iIo5Cn7b3Lnhl6d2w/exec";
    
    let holdTimer = null, progressInterval = null, percent = 0, isHolding = false;
    let videoStream = null;

    // 체크박스 클릭 핸들러
    function toggleCheck() {
        const chk = document.getElementById('agree');
        chk.checked = !chk.checked;
        setupCamera();
    }

    // iOS 및 안드로이드 전면 카메라 웹RTC 연동 최적화
    async function setupCamera() {
        const chk = document.getElementById('agree');
        const btn = document.getElementById('submitBtn');
        const video = document.getElementById('video');

        if(chk.checked) {
            try {
                // 모바일 브라우저 전면 카메라(user) 강제 지정 및 오디오 생략
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 400 }, height: { ideal: 300 } }, 
                    audio: false 
                });
                video.srcObject = videoStream;
                btn.classList.add('ready');
                btn.innerText = "호출하려면 3초간 꾹 누르세요";
            } catch (err) {
                alert("카메라 권한 거부 시 호출 시스템을 이용할 수 없습니다. 설정에서 카메라를 허용해 주세요.");
                chk.checked = false;
                btn.classList.remove('ready');
            }
        } else {
            if(videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            btn.classList.remove('ready');
            btn.innerText = "호출 버튼을 3초간 꾹 누르세요";
        }
    }

    // 3초 누르기 트래킹 개시
    function startHold(e) {
        e.preventDefault();
        if(!document.getElementById('agree').checked) return;
        if(document.getElementById('teacher').value === "" || document.getElementById('studentId').value === "" || document.getElementById('studentName').value === "") {
            alert("빈칸 없이 인적 사항을 입력해 주세요.");
            return;
        }

        isHolding = true;
        percent = 0;
        
        // 버튼 내부 프로그레스바 동적 생성
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = `<div class="progress-bar" id="pBar"></div><span style="position:relative; z-index:2;">호출 중...</span>`;
        
        progressInterval = setInterval(() => {
            if(percent < 100) {
                percent += 2;
                document.getElementById('pBar').style.width = percent + '%';
            }
        }, 60);

        holdTimer = setTimeout(triggerSubmit, 3000);
    }

    // 중간에 손 뗐을 때 초기화
    function endHold() {
        if(!isHolding) return;
        isHolding = false;
        clearTimeout(holdTimer);
        clearInterval(progressInterval);
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = "호출하려면 3초간 꾹 누르세요";
    }

    // 3초 도달 성공시 호출 패킷 빌드 및 스냅샷 인코딩
    function triggerSubmit() {
        isHolding = false;
        clearInterval(progressInterval);
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let base64Image = "";

        // 렌즈 스트림이 살아있다면 캔버스에 픽셀 복사 후 Base64 문자열 변환
        if (videoStream && video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 압축률 0.65로 지정해 전송 속도 업그레이드 및 구글 드라이브 용량 최적화
            const dataUrl = canvas.toDataURL("image/jpeg", 0.65);
            base64Image = dataUrl.split(",")[1]; // 헤더 제거 후 순수 데이터 덩어리만 추출
        }

        // 전송 레이아웃 전환
        document.getElementById('successLayer').style.display = "flex";

        const payload = {
            teacher: document.getElementById('teacher').value,
            id: document.getElementById('studentId').value,
            name: document.getElementById('studentName').value,
            purpose: document.getElementById('purpose').value,
            image: base64Image
        };

        // 구글 웹앱으로 데이터 비동기 일방 전송 (no-cors)
        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(() => {
            // 전송 후 카메라 스트림 종료 처리 (배터리 절약)
            if(videoStream) videoStream.getTracks().forEach(track => track.stop());
            setTimeout(() => { location.reload(); }, 2500);
        }).catch(err => {
            alert("통신 오류가 발생했습니다. 다시 시도해 주세요.");
            location.reload();
        });
    }
</script>
</body>
</html>
