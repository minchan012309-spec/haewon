<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호출 대시보드 - 선생님용</title>
    <style>
        @font-face { font-family: 'Paperlogy'; src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-Regular.woff2') format('woff2'); }
        * { font-family: 'Paperlogy', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8fafc; padding: 40px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #startLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .start-btn { background: #2563eb; color: white; padding: 25px 60px; border-radius: 20px; font-size: 2rem; border: none; cursor: pointer; font-weight: bold; }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .alert-card { background: white; border-radius: 40px; padding: 60px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.1); display: none; flex: 1; margin-bottom: 20px; animation: slideUp 0.5s ease; }
        .alert-card.active { display: block; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .t-name { font-size: 5rem; font-weight: 900; color: #0f172a; margin: 20px 0; }
        .info-box { background: #f1f5f9; padding: 40px; border-radius: 30px; font-size: 3rem; }
        .history-item { background: white; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 1.2rem; font-weight: bold; color: #334155; }
    </style>
</head>
<body>
<div id="startLayer">
    <button class="start-btn" onclick="initSystem()">수신 시작하기</button>
</div>
<div class="header">
    <div style="color:#2563eb; font-weight:bold; font-size:1.5rem;">● 실시간 모니터링 중</div>
    <div id="clock" style="font-size:1.5rem;">00:00:00</div>
</div>
<div id="empty" style="flex:1; display:flex; justify-content:center; align-items:center; font-size:2rem; color:#cbd5e0;">대기 중...</div>
<div class="alert-card" id="card">
    <div style="color:#2563eb; font-size:1.5rem; font-weight:bold;">지금 호출한 선생님</div>
    <div class="t-name" id="tName">---</div>
    <div class="info-box"><span id="sInfo">학번 성함</span><br><span id="sPurp" style="color:#2563eb;">목적</span></div>
</div>
<div id="historyList" style="margin-top:20px;"></div>

<script>
    // 일치 완료: 학생용 및 Apps Script와 동일한 새 웹앱 URL 주소 바인딩
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxLbald6YsDtbJbUOLfT5C4dqdSMIxuVi6HyAy750zz9fyV-Lib8iIo5Cn7b3Lnhl6d2w/exec";
    let lastTime = Date.now(), selectedVoice = null, historyList = [];

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
    setInterval(updateClock, 1000);

    function loadVoice() { 
        selectedVoice = window.speechSynthesis.getVoices().find(v => v.lang.includes('ko') && v.name.includes('Google')) || window.speechSynthesis.getVoices().find(v => v.lang.includes('ko'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoice;

    function initSystem() {
        document.getElementById('startLayer').style.display = 'none';
        loadVoice();
        new Audio('https://t1.daumcdn.net/kakaopay/tesla/20230728/sfx/ding.mp3').play();
        setInterval(checkCall, 1500); // 구글 트래픽 할당량을 고려해 1.5초 간격 조회로 최적화
    }

    async function checkCall() {
        try {
            // 캐시 방지를 위해 랜덤 파라미터 및 type 명시
            const res = await fetch(`${GAS_URL}?type=latest&v=${Date.now()}`);
            const d = await res.json();
            
            if(d.timestamp && Number(d.timestamp) > lastTime) {
                lastTime = Number(d.timestamp);
                notify(d);
            }
        } catch(e) { console.log("조회 에러(무시 가능):", e); }
    }

    function notify(d) {
        document.getElementById('empty').style.display = 'none';
        const card = document.getElementById('card');
        document.getElementById('tName').innerText = d.teacher + " 선생님";
        document.getElementById('sInfo').innerText = d.id + " " + d.name;
        document.getElementById('sPurp').innerText = d.purpose;
        card.classList.add('active');

        // 알림음 재생 및 TTS 송출
        new Audio('https://t1.daumcdn.net/kakaopay/tesla/20230728/sfx/ding.mp3').play();
        setTimeout(() => {
            window.speechSynthesis.cancel(); // 꼬임 방지를 위해 이전 음성 초기화
            const uttr = new SpeechSynthesisUtterance(`${d.teacher} 선생님, ${d.name} 학생이 ${d.purpose}로 호출했습니다.`);
            if(selectedVoice) uttr.voice = selectedVoice; 
            uttr.lang = 'ko-KR'; 
            window.speechSynthesis.speak(uttr);
        }, 800);

        // 히스토리 누적 및 레이아웃 출력 업데이트 (변수명 섀도잉 해결)
        historyList.unshift(d); 
        if(historyList.length > 3) historyList.pop();
        document.getElementById('historyList').innerHTML = historyList.map(h => `<div class="history-item"><span>${h.id} ${h.name}</span><span>${h.purpose}</span></div>`).join('');

        // 10초 후 화면 복귀 (너무 길지 않게 조절)
        setTimeout(() => { 
            card.classList.remove('active'); 
            document.getElementById('empty').style.display = 'flex'; 
        }, 10000);
    }
</script>
</body>
</html>
