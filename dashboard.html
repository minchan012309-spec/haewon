<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교무실 호출 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" type="text/css"/>
    <style>
        * { font-family: 'Paperlogy', sans-serif !important; box-sizing: border-box; }
        body { margin: 0; padding: 20px; background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 2px solid #1e293b; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 2rem; color: #38bdf8; font-weight: 900; }
        .status-badge { background: #1e293b; padding: 8px 16px; border-radius: 50px; font-size: 0.95rem; color: #94a3b8; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; flex: 1; align-content: start; }
        .card { background: #1e293b; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #334155; display: flex; flex-direction: column; animation: slideIn 0.3s ease; position: relative; overflow: hidden; }
        @keyframes slideIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .teacher-tag { background: #38bdf8; color: #0f172a; padding: 6px 14px; border-radius: 10px; font-weight: 900; font-size: 1.1rem; }
        .time-tag { color: #64748b; font-size: 0.85rem; font-weight: bold; }
        
        .student-info { font-size: 1.6rem; font-weight: 800; color: #f1f5f9; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .student-id { font-size: 1.1rem; color: #38bdf8; background: rgba(56, 189, 248, 0.15); padding: 2px 8px; border-radius: 6px; font-weight: bold; }
        .purpose { background: #2d3748; padding: 12px 15px; border-radius: 12px; font-size: 1.05rem; color: #cbd5e1; line-height: 1.4; margin-bottom: 15px; font-weight: 600; border-left: 4px solid #f59e0b; }
        
        .photo-box { width: 100%; height: 180px; background: #0f172a; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; border: 1px solid #334155; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .no-photo { color: #475569; font-size: 0.9rem; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; margin-top: auto; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-complete { background: #10b981; color: white; }
        .btn-complete:hover { background: #059669; }
        .btn-absent { background: #ef4444; color: white; }
        .btn-absent:hover { background: #dc2626; }
        
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 100px 20px; color: #475569; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🏫 교무실 실시간 호출 대시보드</h1>
        <div style="color: #64748b; margin-top: 5px; font-size: 0.95rem;">학생들의 호출 현황을 실시간으로 관리합니다.</div>
    </div>
    <div class="status-badge">
        <div class="status-dot"></div>
        <span id="syncText">실시간 동기화 중</span>
    </div>
</header>

<div class="grid" id="cardGrid">
    <div class="empty-state">현재 대기 중인 호출이 없습니다.</div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwQd_Y-13sGimR7bW8lFsH1PKYTPD3AYv9eB-9DbKEW5qvnx7Ec0XatMwKOnje-eR9Jsg/exec";
    let activeCalls = [];
    let processedIds = new Set();
    let isFirstLoad = true;

    // 🔊 [선명하고 웅장한 '딩-동-' 오디오 합성 차임벨] 함수
    function playClearChime() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const now = ctx.currentTime;

            // 1. 첫 번째 음: '딩' (높고 맑은 톤, 주파수 880Hz - A5)
            const osc1 = ctx.createOscillator();
            const gain1 = ctx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880, now); 
            
            // 볼륨 증폭 (볼륨 인자를 대폭 상향 조정하여 크게 들리도록 설정)
            gain1.gain.setValueAtTime(0, now);
            gain1.gain.linearRampToValueAtTime(1.5, now + 0.02); 
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
            
            osc1.connect(gain1);
            gain1.connect(ctx.destination);
            osc1.start(now);
            osc1.stop(now + 0.6);

            // 2. 두 번째 음: '동' (안정적인 저음 톤, 주파수 554.37Hz - C#5)
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(554.37, now + 0.25); // 0.25초 뒤 엇박자로 재생
            
            gain2.gain.setValueAtTime(0, now + 0.25);
            gain2.gain.linearRampToValueAtTime(1.5, now + 0.27);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
            
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.start(now + 0.25);
            osc2.stop(now + 0.9);

        } catch (e) {
            console.log("오디오 플레이어 오류 또는 브라우저 제한:", e);
        }
    }

    // 📡 실시간 대시보드 데이터 패치 룹
    async function fetchDashboardData() {
        try {
            const res = await fetch(`${GAS_URL}?type=get_calls&v=${Date.now()}`);
            const data = await res.json();
            
            document.getElementById('syncText').innerText = "실시간 동기화 중";
            
            // 🔒 [버그 픽스] 데이터 바인딩 시 부재중 알림 신호(ABSENT_ALERT)는 대시보드 내부 알림 트리거에서 엄격히 차단
            if (data && data.type === "ABSENT_ALERT") {
                return; 
            }

            if (Array.isArray(data)) {
                activeCalls = data;
                renderCards();
            }
        } catch (e) {
            document.getElementById('syncText').innerText = "재연결 시도 중...";
            console.log("네트워크 대기 중...");
        }
    }

    function renderCards() {
        const grid = document.getElementById('cardGrid');
        if (activeCalls.length === 0) {
            grid.innerHTML = '<div class="empty-state">현재 대기 중인 호출이 없습니다.</div>';
            processedIds.clear();
            isFirstLoad = false;
            return;
        }

        let html = '';
        let hasNewCall = false;

        activeCalls.forEach(call => {
            // 유니크 키 조합 생성 (학번 + 시간 기반)
            const uniqueKey = `${call.id}_${call.timestamp}`;
            
            if (!processedIds.has(uniqueKey)) {
                if (!isFirstLoad) {
                    hasNewCall = true; // 새로운 호출 유입 감지
                }
                processedIds.add(uniqueKey);
            }

            const photoHtml = call.image 
                ? `<div class="photo-box"><img src="data:image/jpeg;base64,${call.image}" alt="학생 인증 사진"></div>`
                : `<div class="photo-box"><div class="no-photo">인증 사진 없음</div></div>`;

            html += `
                <div class="card" id="card_${call.id}">
                    <div class="card-header">
                        <span class="teacher-tag">${call.teacher} 쌤</span>
                        <span class="time-tag">${call.time || '방금 전'}</span>
                    </div>
                    <div class="student-info">
                        <span class="student-id">${call.id}</span>
                        <span>${call.name}</span>
                    </div>
                    <div class="purpose">${call.purpose}</div>
                    ${photoHtml}
                    <div class="btn-group">
                        <button class="btn btn-complete" onclick="handleAction('complete', '${call.id}', '${call.teacher}')">완료</button>
                        <button class="btn btn-absent" onclick="handleAction('absent', '${call.id}', '${call.teacher}')">부재중</button>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = html;

        // 🔔 신규 학생 호출 접수 시 웅장한 2단 차임벨 자동 구동
        if (hasNewCall) {
            playClearChime();
        }
        isFirstLoad = false;
    }

    async function handleAction(actionType, studentId, teacherName) {
        const card = document.getElementById(`card_${studentId}`);
        if(card) card.style.opacity = '0.5';

        try {
            let payload = {};
            if (actionType === 'complete') {
                payload = { type: "delete_call", id: studentId };
            } else if (actionType === 'absent') {
                // 부재중 처리 시 학생 패드로 원격 신호 바인딩
                payload = { type: "set_absent", teacher: teacherName };
            }

            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });

            // 즉시 로컬 리렌더링 반영
            activeCalls = activeCalls.filter(c => c.id !== studentId);
            renderCards();
        } catch (e) {
            alert("처리 중 에러가 발생했습니다. 다시 시도해 주세요.");
            if(card) card.style.opacity = '1';
        }
    }

    // 0.5초 간격 초고속 패치 동기화 루프 작동
    window.addEventListener('DOMContentLoaded', () => {
        fetchDashboardData();
        setInterval(fetchDashboardData, 500);
        
        // 브라우저 오디오 보안 정책 우회용 터치 트리거
        window.addEventListener('click', () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if(ctx.state === 'suspended') ctx.resume();
        }, { once: true });
    </script>
</body>
</html>
