<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호출 대시보드 - 선생님용</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" type="text/css"/>
    <style>
        * { font-family: 'Paperlogy', sans-serif !important; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8fafc; padding: 30px 40px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #startLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 18px; }
        .start-btn { background: #2563eb; color: white; padding: 25px 60px; border-radius: 20px; font-size: 2rem; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 10px 30px rgba(37,99,235,0.3); }

        /* 헤더: 겹침 버그 수정 — 한 줄에 나란히, gap으로 안전하게 분리 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 20px; flex-shrink: 0; }
        .header-left { color:#2563eb; font-weight:bold; font-size:1.4rem; white-space: nowrap; }
        .header-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
        #clock { font-size: 1.4rem; font-weight: 700; color: #334155; white-space: nowrap; }
        .settings-gear-btn { background: #f1f5f9; border: none; padding: 10px 16px; border-radius: 12px; font-weight: bold; color: #475569; cursor: pointer; font-size: 0.95rem; white-space: nowrap; }
        .settings-gear-btn:hover { background: #e2e8f0; }

        /* 통계 바 */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: white; border: 2px solid #e2e8f0; border-radius: 18px; padding: 16px; margin-bottom: 18px; flex-shrink: 0; }
        .stats-bar > div { text-align: center; padding: 0 6px; }
        .stats-bar > div:not(:last-child) { border-right: 1px solid #e2e8f0; }
        .stat-label { font-size: 0.78rem; color: #64748b; font-weight: bold; }
        .stat-value { font-size: 1.35rem; font-weight: 900; color: #1e293b; margin-top: 4px; }

        .alert-card { background: white; border-radius: 40px; padding: 50px; text-align: left; box-shadow: 0 30px 60px rgba(0,0,0,0.1); display: none; flex-direction: column; justify-content: center; flex: 1; margin-bottom: 20px; border: 3px solid #2563eb; }
        .alert-card.pop-in { animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes cardPop { 0% { transform: scale(0.85); opacity: 0; } 60% { transform: scale(1.03); opacity: 1; } 100% { transform: scale(1); } }
        
        .alert-left { width: 100%; display: flex; flex-direction: column; justify-content: center; }
        .t-name { font-size: 4.2rem; font-weight: 900; color: #0f172a; margin: 16px 0; }
        .info-box { background: #f1f5f9; padding: 34px; border-radius: 28px; font-size: 2.7rem; font-weight: bold; line-height: 1.5; margin-bottom: 26px; }
        
        .absent-btn { background: #dc2626; color: white; padding: 22px; border-radius: 20px; font-size: 2rem; font-weight: bold; border: none; cursor: pointer; width: 100%; text-align: center; box-shadow: 0 5px 15px rgba(220,38,38,0.3); }
        .absent-btn:hover { background: #b91c1c; }

        .history-item { background: white; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 1.1rem; font-weight: bold; color: #334155; border-left: 5px solid #cbd5e0; }

        .toast-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -30%) scale(0.9);
            background: rgba(15, 23, 42, 0.95); color: white; padding: 30px 60px; border-radius: 28px;
            font-size: 2.2rem; font-weight: bold; box-shadow: 0 30px 60px rgba(0,0,0,0.3); z-index: 2000;
            opacity: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            pointer-events: none; display: flex; align-items: center; gap: 20px; white-space: nowrap;
        }
        .toast-container.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #roomGate { position: fixed; inset: 0; background: #f8fafc; z-index: 3000000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        #roomGate h1 { font-size: 1.8rem; margin-bottom: 8px; }
        #roomGate p { color: #64748b; margin-bottom: 30px; }
        .room-choice-btn { background: white; border: 2px solid #e2e8f0; padding: 24px 40px; border-radius: 18px; font-size: 1.3rem; font-weight: bold; color: #1e293b; cursor: pointer; width: 100%; max-width: 380px; margin-bottom: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .room-choice-btn:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
        .room-tag { background: #eff6ff; color: #2563eb; font-weight: bold; padding: 6px 14px; border-radius: 10px; font-size: 1.1rem; }

        #adminModal { position: fixed; inset: 0; background: rgba(15,23,42,0.72); z-index: 2500000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .admin-box { background: white; border-radius: 24px; padding: 30px; width: 100%; max-width: 440px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); text-align: center; }
        .pin-display { font-size: 2rem; font-weight: bold; letter-spacing: 8px; margin: 15px 0; color: #1e293b; height: 40px; }
        .pad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .pad-btn { background: #f1f5f9; border: none; padding: 18px 4px; border-radius: 14px; font-size: 1.4rem; font-weight: bold; color: #334155; cursor: pointer; white-space: nowrap; display: flex; align-items: center; justify-content: center; }
        .pad-btn:active { background: #cbd5e1; }
        .pad-btn.danger { background: #fee2e2; color: #ef4444; }

        #settingsPanel { position: fixed; inset: 0; background: #f8fafc; z-index: 2500000; display: none; flex-direction: column; padding: 36px 50px; overflow-y: auto; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .settings-title { color: #2563eb; font-size: 1.7rem; font-weight: 900; }
        .settings-close-btn { background: #f1f5f9; border: none; padding: 12px 22px; border-radius: 14px; font-weight: bold; color: #475569; cursor: pointer; font-size: 0.95rem; }
        .settings-close-btn:hover { background: #e2e8f0; }
        .settings-section { background: white; border: 2px solid #e2e8f0; border-radius: 20px; padding: 24px; margin-bottom: 18px; max-width: 640px; width: 100%; }
        .settings-section h3 { font-size: 1.1rem; font-weight: 800; color: #1e293b; margin-bottom: 14px; }
        .preset-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
        .preset-choice { border: 2px solid #e2e8f0; border-radius: 14px; padding: 14px; cursor: pointer; text-align: center; font-weight: 700; color: #475569; background: #f8fafc; }
        .preset-choice.selected { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
        .vol-row { margin-bottom: 14px; }
        .vol-row label { font-size: 0.9rem; font-weight: bold; color: #475569; display: flex; justify-content: space-between; margin-bottom: 6px; }
        .vol-row input[type="range"] { width: 100%; }
        .settings-input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; margin-bottom: 10px; }
        .settings-btn-primary { background: #2563eb; color: white; border: none; padding: 14px; border-radius: 14px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; }
        .settings-btn-primary:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div id="roomGate">
    <h1>🏫 이 모니터는 어느 교무실인가요?</h1>
    <p>한 번만 선택하면 저장되어 다음부터 자동으로 이 교무실 알림만 표시됩니다.</p>
    <div id="roomChoiceList"></div>
</div>

<div id="startLayer">
    <div class="room-tag" id="startRoomTag"></div>
    <button class="start-btn" onclick="initSystem()">수신 시작하기</button>
</div>

<div class="header">
    <div class="header-left">● 실시간 모니터링 중 <span id="headerRoomTag" style="color:#0f172a;"></span></div>
    <div class="header-right">
        <div id="clock">00:00:00</div>
        <button class="settings-gear-btn" onclick="openAdmin()">⚙️ 관리자 설정</button>
    </div>
</div>

<div class="stats-bar">
    <div><div class="stat-label">오늘 총 호출</div><div class="stat-value" id="statTodayCount">0건</div></div>
    <div><div class="stat-label">평균 대기 시간</div><div class="stat-value" id="statAvgWait">-</div></div>
    <div><div class="stat-label">최다 호출 교사</div><div class="stat-value" id="statTopTeacher" style="font-size:1.1rem;">-</div></div>
</div>

<div id="empty" style="flex:1; display:flex; justify-content:center; align-items:center; font-size:2rem; color:#cbd5e0;">대기 중...</div>

<div class="alert-card" id="card">
    <div class="alert-left">
        <div style="color:#2563eb; font-size:1.8rem; font-weight:bold;">지금 호출한 선생님</div>
        <div class="t-name" id="tName">---</div>
        <div class="info-box"><span id="sInfo">학번 성함</span><br><span id="sPurp" style="color:#2563eb;">목적</span></div>
        <button class="absent-btn" id="absentBtn">선생님 부재중 전송</button>
    </div>
</div>

<div id="historyList" style="margin-top:10px; overflow-y:auto;"></div>

<div id="toast" class="toast-container">
    <span style="color: #ef4444;">🚨</span> <span id="toastMessage">부재중 신호가 전송되었습니다.</span>
</div>

<div id="adminModal">
    <div class="admin-box" id="stepPin">
        <h2 style="margin:0; color:#1e293b; font-size:1.4rem;" id="pinTitleText">관리자 인증</h2>
        <div class="subtitle" style="color:#64748b; margin:8px 0 10px;" id="pinSubtitle">비밀번호 6자리를 입력하세요.</div>
        <div class="pin-display" id="pinStars"></div>
        <div class="pad-grid">
            <button class="pad-btn" onclick="pressPin('1')">1</button>
            <button class="pad-btn" onclick="pressPin('2')">2</button>
            <button class="pad-btn" onclick="pressPin('3')">3</button>
            <button class="pad-btn" onclick="pressPin('4')">4</button>
            <button class="pad-btn" onclick="pressPin('5')">5</button>
            <button class="pad-btn" onclick="pressPin('6')">6</button>
            <button class="pad-btn" onclick="pressPin('7')">7</button>
            <button class="pad-btn" onclick="pressPin('8')">8</button>
            <button class="pad-btn" onclick="pressPin('9')">9</button>
            <button class="pad-btn danger" onclick="clearPin()">C</button>
            <button class="pad-btn" onclick="pressPin('0')">0</button>
            <button class="pad-btn" style="background:#e2e8f0; font-size:1rem;" onclick="closeAdminPin()">닫기</button>
        </div>
    </div>
</div>

<div id="settingsPanel">
    <div class="settings-header">
        <div class="settings-title">⚙️ 관리자 설정 <span style="color:#94a3b8; font-size:1rem; font-weight:700;" id="settingsRoomTag"></span></div>
        <button class="settings-close-btn" onclick="closeSettingsPanel()">닫기 ✕</button>
    </div>

    <div class="settings-section">
        <h3>🔔 알림 소리 설정</h3>
        <div class="preset-row" id="presetRow"></div>
        <div class="vol-row"><label><span>알림음 볼륨</span><span id="alertVolLabel">100%</span></label><input type="range" id="alertVolSlider" min="0" max="100" value="100"></div>
        <div class="vol-row"><label><span>TTS(음성 안내) 볼륨</span><span id="ttsVolLabel">100%</span></label><input type="range" id="ttsVolSlider" min="0" max="100" value="100"></div>
        <button class="settings-btn-primary" onclick="saveSoundSettings()">소리 설정 저장</button>
    </div>

    <div class="settings-section">
        <h3>🏫 교무실 변경</h3>
        <div id="roomSwitchList2"></div>
    </div>

    <div class="settings-section">
        <h3>🔒 관리자 비밀번호 변경</h3>
        <input type="password" inputmode="numeric" id="currentAdminPw" class="settings-input" placeholder="현재 비밀번호 6자리" maxlength="6">
        <input type="password" inputmode="numeric" id="newAdminPw" class="settings-input" placeholder="새 비밀번호 6자리" maxlength="6">
        <input type="password" inputmode="numeric" id="confirmAdminPw" class="settings-input" placeholder="새 비밀번호 확인" maxlength="6">
        <button class="settings-btn-primary" style="background:#ef4444;" onclick="executeChangePassword()">비밀번호 변경</button>
    </div>
</div>

<!-- 🔥 파이어베이스 SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
    // ===================== 🔥 파이어베이스 설정 =====================
    const firebaseConfig = {
      apiKey: "AIzaSyC3Fc377RWFdwoEwBLd0YqEvmH35bFJKUI",
      authDomain: "teacher-calling-system-3ef78.firebaseapp.com",
      databaseURL: "https://teacher-calling-system-3ef78-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "teacher-calling-system-3ef78",
      storageBucket: "teacher-calling-system-3ef78.firebasestorage.app",
      messagingSenderId: "126407907843",
      appId: "1:126407907843:web:cfed783dadcb6ce8a48c36"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    auth.setPersistence(firebase.auth.Auth.Persistence.NONE).catch(()=>{});
    const ADMIN_EMAIL = "master-admin@teacher-calling-system.local";

    // 🧾 구글 시트 실시간 로그 연동 주소
    const SHEET_LOG_URL = "";

    // ===================== 🏫 교무실(방) 구분 =====================
    const ROOM_LIST = ["1학년 교무실", "2학년 교무실", "3학년 교무실", "본교무실"];
    const urlParams = new URLSearchParams(window.location.search);
    let ROOM = urlParams.get('room') || localStorage.getItem('sys_saved_room_dashboard') || "";

    function renderRoomButtons(container) {
        container.innerHTML = "";
        ROOM_LIST.forEach(r => {
            const b = document.createElement('button');
            b.className = 'room-choice-btn';
            b.style.marginBottom = '10px';
            b.innerText = (r === ROOM ? '✅ ' : '') + r;
            b.onclick = () => {
                localStorage.setItem('sys_saved_room_dashboard', r);
                const url = new URL(window.location.href);
                url.searchParams.set('room', r);
                window.location.href = url.toString();
            };
            container.appendChild(b);
        });
    }

    if (!ROOM_LIST.includes(ROOM)) {
        document.getElementById('roomGate').style.display = 'flex';
        renderRoomButtons(document.getElementById('roomChoiceList'));
        throw new Error("ROOM_NOT_SELECTED");
    }
    localStorage.setItem('sys_saved_room_dashboard', ROOM);
    document.title = `호출 대시보드 - ${ROOM}`;
    document.getElementById('startRoomTag').innerText = "📍 " + ROOM;
    document.getElementById('headerRoomTag').innerText = "[" + ROOM + "]";
    document.getElementById('settingsRoomTag').innerText = "· " + ROOM;

    let lastTime = 0, historyList = [];
    let koVoice = null, autoCloseTimer = null, toastTimer = null;
    let currentCall = null;
    let inputtedPin = "";
    let adminSetupDone = true;
    let pinStage = 'login';
    let pinFirstEntry = '';
    let roomSettings = { alertVolume: 100, ttsVolume: 100, soundPreset: 'default' };
    const PRESETS = [
        { key: 'default', label: '기본 벨 (경쾌한 2음)' },
        { key: 'soft', label: '차분한 알림 (부드러운 사인파)' },
        { key: 'urgent', label: '긴급 경보 (빠른 반복음)' },
        { key: 'short', label: '짧은 알림 (단타)' }
    ];

    db.ref('shared/adminSetupDone').on('value', snap => { adminSetupDone = !!snap.val(); });
    db.ref(`rooms/${ROOM}/settings`).on('value', snap => {
        roomSettings = Object.assign({ alertVolume: 100, ttsVolume: 100, soundPreset: 'default' }, snap.val() || {});
    });

    // ===================== 💓 하트비트 =====================
    (function startHeartbeat() {
        const beat = () => db.ref(`rooms/${ROOM}/heartbeat/dashboard`).set(Date.now()).catch(()=>{});
        beat();
        setInterval(beat, 20000);
    })();

    // ===================== 항목 4: 마스터에서 강제 새로고침 수신 =====================
    (function initForceReload() {
        let baseReloadVal = null;
        db.ref(`rooms/${ROOM}/commands/dashboardReload`).on('value', snap => {
            const val = snap.val();
            if (val === null) return;
            if (baseReloadVal === null) { baseReloadVal = val; return; }
            if (val !== baseReloadVal) { location.reload(); }
        });
    })();

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
    setInterval(updateClock, 1000);
    updateClock();

    function getBestKoVoice() {
        if (!('speechSynthesis' in window)) return;
        const voices = window.speechSynthesis.getVoices();
        koVoice = voices.find(v => v.lang.includes('ko') && v.name.includes('Google')) || 
                  voices.find(v => v.lang.includes('ko') && v.name.includes('Natural')) ||
                  voices.find(v => v.lang.includes('ko'));
    }
    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = getBestKoVoice;
        getBestKoVoice();
    }

    async function initSystem() {
        document.getElementById('startLayer').style.display = 'none';
        getBestKoVoice();
        
        const initialSilent = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');
        initialSilent.volume = 0;
        initialSilent.play().catch(e => console.log(e));

        try {
            const snap = await db.ref(`rooms/${ROOM}/latestCall`).once('value');
            const d = snap.val();
            lastTime = (d && d.timestamp) ? Number(d.timestamp) : Date.now();
        } catch(e) { lastTime = Date.now(); }

        db.ref(`rooms/${ROOM}/latestCall`).on('value', snap => {
            const d = snap.val();
            if (d && d.timestamp && Number(d.timestamp) > lastTime) {
                lastTime = Number(d.timestamp);
                notify(d);
                refreshStats();
            }
        });

        refreshStats();
        setInterval(refreshStats, 30000);
    }

    // ===================== 📊 통계 =====================
    function parseToYYYYMMDD(str) {
        if(!str) return "";
        str = String(str).trim();
        if(/^\d{4}-\d{2}-\d{2}/.test(str)) return str.slice(0, 10);
        let m = str.match(/(\d{4})[\.\-\/]\s*(\d{1,2})[\.\-\/]\s*(\d{1,2})/);
        if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
        let d = new Date(str);
        if(!isNaN(d.getTime())) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        return "";
    }

    async function refreshStats() {
        try {
            const snap = await db.ref(`rooms/${ROOM}/calls`).once('value');
            const val = snap.val() || {};
            const all = Object.values(val);
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const todayLogs = all.filter(l => parseToYYYYMMDD(l.time || l.timestamp) === todayStr);

            document.getElementById('statTodayCount').innerText = `${todayLogs.length}건`;

            const teacherMap = {};
            todayLogs.forEach(l => { if(l.teacher) teacherMap[l.teacher] = (teacherMap[l.teacher]||0)+1; });
            let topTeacher = "-", maxC = 0;
            for(let t in teacherMap) if(teacherMap[t] > maxC) { maxC = teacherMap[t]; topTeacher = t; }
            document.getElementById('statTopTeacher').innerText = topTeacher !== "-" ? `${topTeacher} 쌤 (${maxC}건)` : "-";

            const resolved = todayLogs.filter(l => l.resolvedAt && l.timestamp);
            if (resolved.length > 0) {
                const avgMs = resolved.reduce((sum, l) => sum + (l.resolvedAt - l.timestamp), 0) / resolved.length;
                const avgSec = Math.round(avgMs / 1000);
                document.getElementById('statAvgWait').innerText = avgSec < 60 ? `${avgSec}초` : `${Math.floor(avgSec/60)}분 ${avgSec%60}초`;
            } else {
                document.getElementById('statAvgWait').innerText = "-";
            }
        } catch(e) { console.log(e); }
    }

    function showToast(message) {
        clearTimeout(toastTimer);
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').innerText = message;
        toast.classList.add('show');
        toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2500);
    }

    // ===================== 🔔 알림음 프리셋 =====================
    function playPresetTone(preset, volScale) {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const now = ctx.currentTime;
            const tone = (freq, start, dur, type, peak) => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(peak * volScale, start + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(start); osc.stop(start + dur);
            };
            if (preset === 'soft') {
                tone(880, now, 0.5, 'sine', 0.8);
                tone(1100, now + 0.25, 0.6, 'sine', 0.8);
            } else if (preset === 'urgent') {
                for (let i = 0; i < 5; i++) tone(1500, now + i * 0.18, 0.15, 'square', 1.0);
            } else if (preset === 'short') {
                tone(1300, now, 0.25, 'square', 1.0);
            } else {
                tone(1200, now, 0.6, 'square', 1.2);
                tone(880, now + 0.22, 0.9, 'square', 1.2);
            }
        } catch (e) { console.log(e); }
    }

    // ===================== 🈁 한국어 조사 처리 (으로/로) =====================
    function getEuroParticle(word) {
        if (!word) return '으로';
        const lastChar = word[word.length - 1];
        const code = lastChar.charCodeAt(0) - 0xAC00;
        if (code < 0 || code > 11171) return '으로';
        const jong = code % 28;
        if (jong === 0 || jong === 8) return '로';
        return '으로';
    }

    function notify(d) {
        if(!d || !d.name || !d.teacher) return;

        clearTimeout(autoCloseTimer);
        currentCall = d;
        
        document.getElementById('empty').style.display = 'none';
        const card = document.getElementById('card');
        
        document.getElementById('tName').innerText = d.teacher + " 선생님";
        document.getElementById('sInfo').innerText = d.id + " " + d.name;
        document.getElementById('sPurp').innerText = d.purpose;
        
        card.style.display = "flex"; 
        card.classList.remove('pop-in');
        void card.offsetWidth;
        card.classList.add('pop-in');

        const alertVol = Math.max(0, Math.min(1, (roomSettings.alertVolume ?? 100) / 100));
        playPresetTone(roomSettings.soundPreset || 'default', alertVol);

        setTimeout(() => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const particle = getEuroParticle(d.purpose);
                const uttr = new SpeechSynthesisUtterance(`${d.teacher} 선생님, ${d.name} 학생이 ${d.purpose}${particle} 호출했습니다.`);
                if(koVoice) uttr.voice = koVoice; 
                uttr.lang = 'ko-KR'; 
                uttr.rate = 1.05; 
                uttr.volume = Math.max(0, Math.min(1, (roomSettings.ttsVolume ?? 100) / 100));
                window.speechSynthesis.speak(uttr);
            }
        }, 650);

        historyList.unshift(d); 
        if(historyList.length > 3) historyList.pop();
        document.getElementById('historyList').innerHTML = historyList.map(h => `<div class="history-item"><span>${h.id} ${h.name}</span><span>${h.purpose}</span></div>`).join('');

        autoCloseTimer = setTimeout(() => { 
            closeCard();
            resolveCall(d, "출력 완료");
        }, 30000); 
    }

    // absentBtn 핸들러는 딱 한 번만 등록 — currentCall(전역 변수)을 참조하므로
    // "아직 새 호출을 한 번도 못 받은 상태에서 눌러도 아무 반응 없는" 버그가 사라짐
    document.getElementById('absentBtn').addEventListener('click', () => {
        if (!currentCall) { alert('현재 대기중인 호출이 없습니다.'); return; }
        clearTimeout(autoCloseTimer);
        const d = currentCall;
        sendAbsentSignal(d);
        resolveCall(d, "부재중 처리");
        showToast(`${d.teacher} 선생님 부재중 신호를 전송했습니다.`);
        closeCard();
    });

    function closeCard() {
        const card = document.getElementById('card');
        card.style.display = "none";
        document.getElementById('empty').style.display = 'flex'; 
    }

    function resolveCall(d, statusText) {
        if (d.key) {
            db.ref(`rooms/${ROOM}/calls/${d.key}`).update({ status: statusText, resolvedAt: Date.now() }).catch(err => console.log(err));
        }
        postToSheet({ action: 'update', room: ROOM, key: d.key, status: statusText });
        refreshStats();
    }

    function sendAbsentSignal(d) {
        db.ref(`rooms/${ROOM}/absentSignal`).set({ teacher: d.teacher, timestamp: Date.now() }).catch(err => console.log(err));
    }

    function postToSheet(payload) {
        if (!SHEET_LOG_URL) return;
        fetch(SHEET_LOG_URL, {
            method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        }).catch(err => console.log("시트 연동 오류:", err));
    }

    // ===================== 🔐 관리자 인증 =====================
    function openAdmin() {
        clearPin();
        pinStage = adminSetupDone ? 'login' : 'setup_new';
        pinFirstEntry = '';
        updatePinPadUI();
        document.getElementById('adminModal').style.display = 'flex';
    }
    function closeAdminPin() {
        document.getElementById('adminModal').style.display = 'none';
        clearPin();
    }
    function updatePinPadUI() {
        const title = document.getElementById('pinTitleText');
        const subtitle = document.getElementById('pinSubtitle');
        if (pinStage === 'setup_new') {
            title.innerText = '관리자 비밀번호 최초 설정';
            subtitle.innerText = '모든 교무실이 함께 사용할 비밀번호예요. 숫자 6자리를 입력하세요.';
        } else if (pinStage === 'setup_confirm') {
            title.innerText = '비밀번호 확인';
            subtitle.innerText = '방금 입력한 6자리를 다시 입력해주세요.';
        } else {
            title.innerText = '관리자 인증';
            subtitle.innerText = '비밀번호 6자리를 입력하세요.';
        }
    }
    function pressPin(num) {
        const blockUntil = parseInt(localStorage.getItem('sys_admin_block_until_dash') || '0');
        if (Date.now() < blockUntil) { clearPin(); return; }
        if (inputtedPin.length >= 6) return;
        inputtedPin += num;
        document.getElementById('pinStars').innerText = "• ".repeat(inputtedPin.length);
        if (inputtedPin.length === 6) setTimeout(() => handlePinComplete(), 150);
    }
    function clearPin() {
        inputtedPin = "";
        const el = document.getElementById('pinStars');
        if (el) el.innerText = "";
    }

    // 키보드 입력 지원
    function setupPasswordKeyboardSupport() {
        const loginGate = document.getElementById('loginGate');
        if (!loginGate) return;
        
        document.addEventListener('keydown', (e) => {
            if (loginGate.style.display === 'none') return;
            
            // 숫자 0-9 입력
            if (/^[0-9]$/.test(e.key)) {
                e.preventDefault();
                pressPin(e.key);
            }
            // Backspace - 삭제
            else if (e.key === 'Backspace') {
                e.preventDefault();
                clearPin();
            }
            // Enter - 확인
            else if (e.key === 'Enter') {
                e.preventDefault();
                if (inputtedPin.length === 6) {
                    handlePinComplete();
                }
            }
        });
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupPasswordKeyboardSupport);
    } else {
        setupPasswordKeyboardSupport();
    }
    async function handlePinComplete() {
        const pin = inputtedPin;
        if (pinStage === 'setup_new') {
            pinFirstEntry = pin; pinStage = 'setup_confirm'; updatePinPadUI(); clearPin();
            return;
        }
        if (pinStage === 'setup_confirm') {
            if (pin !== pinFirstEntry) {
                alert('입력하신 두 비밀번호가 서로 다릅니다. 처음부터 다시 설정해주세요.');
                pinStage = 'setup_new'; pinFirstEntry = ''; updatePinPadUI(); clearPin();
                return;
            }
            try {
                await auth.createUserWithEmailAndPassword(ADMIN_EMAIL, pin);
                await db.ref('shared/adminSetupDone').set(true);
                enterSettingsPanel();
            } catch (err) {
                if (err.code === 'auth/email-already-in-use') {
                    alert('이미 다른 기기에서 비밀번호가 설정되어 있습니다. 로그인 화면으로 전환할게요.');
                    pinStage = 'login'; updatePinPadUI(); clearPin();
                } else if (err.code === 'auth/operation-not-allowed') {
                    alert('아직 관리자 인증 기능이 켜져 있지 않아요. 파이어베이스 콘솔에서 "이메일/비밀번호" 로그인을 켜주세요.');
                    closeAdminPin();
                } else { alert('설정 중 오류가 발생했습니다: ' + err.message); clearPin(); }
            }
            return;
        }
        try {
            await auth.signInWithEmailAndPassword(ADMIN_EMAIL, pin);
            localStorage.setItem('sys_admin_fail_count_dash', '0');
            localStorage.setItem('sys_admin_block_until_dash', '0');
            enterSettingsPanel();
        } catch (err) {
            if (err.code === 'auth/user-not-found') {
                alert('아직 비밀번호가 설정되지 않았어요. 최초 설정 화면으로 이동할게요.');
                pinStage = 'setup_new'; updatePinPadUI(); clearPin();
                return;
            }
            if (err.code === 'auth/operation-not-allowed') {
                alert('아직 관리자 인증 기능이 켜져 있지 않아요.');
                closeAdminPin();
                return;
            }
            let failCount = parseInt(localStorage.getItem('sys_admin_fail_count_dash') || '0') + 1;
            localStorage.setItem('sys_admin_fail_count_dash', failCount);
            if (failCount >= 5) {
                localStorage.setItem('sys_admin_block_until_dash', Date.now() + 5*60*1000);
                closeAdminPin();
                alert('인증 5회 실패로 5분간 잠금되었습니다.');
            } else {
                alert(`비밀번호가 올바르지 않습니다. (오류 ${failCount}/5)`);
                clearPin();
            }
        }
    }

    function enterSettingsPanel() {
        document.getElementById('adminModal').style.display = 'none';
        document.getElementById('settingsPanel').style.display = 'flex';
        renderPresetRow();
        document.getElementById('alertVolSlider').value = roomSettings.alertVolume ?? 100;
        document.getElementById('ttsVolSlider').value = roomSettings.ttsVolume ?? 100;
        document.getElementById('alertVolLabel').innerText = (roomSettings.alertVolume ?? 100) + '%';
        document.getElementById('ttsVolLabel').innerText = (roomSettings.ttsVolume ?? 100) + '%';
        renderRoomButtons(document.getElementById('roomSwitchList2'));
    }
    function closeSettingsPanel() {
        document.getElementById('settingsPanel').style.display = 'none';
        auth.signOut().catch(()=>{});
    }

    let selectedPreset = 'default';
    function renderPresetRow() {
        selectedPreset = roomSettings.soundPreset || 'default';
        const row = document.getElementById('presetRow');
        row.innerHTML = "";
        PRESETS.forEach(p => {
            const el = document.createElement('div');
            el.className = 'preset-choice' + (p.key === selectedPreset ? ' selected' : '');
            el.innerText = p.label;
            el.onclick = () => {
                selectedPreset = p.key;
                document.querySelectorAll('.preset-choice').forEach(x => x.classList.remove('selected'));
                el.classList.add('selected');
                const vol = document.getElementById('alertVolSlider').value / 100;
                playPresetTone(p.key, vol);
            };
            row.appendChild(el);
        });
    }
    document.getElementById('alertVolSlider').addEventListener('input', function() {
        document.getElementById('alertVolLabel').innerText = this.value + '%';
    });
    document.getElementById('ttsVolSlider').addEventListener('input', function() {
        document.getElementById('ttsVolLabel').innerText = this.value + '%';
    });

    function saveSoundSettings() {
        const alertVolume = parseInt(document.getElementById('alertVolSlider').value);
        const ttsVolume = parseInt(document.getElementById('ttsVolSlider').value);
        db.ref(`rooms/${ROOM}/settings`).set({ soundPreset: selectedPreset, alertVolume, ttsVolume });
        alert('알림 소리 설정이 저장되었습니다.');
    }

    async function executeChangePassword() {
        const cur = document.getElementById('currentAdminPw').value;
        const nPw = document.getElementById('newAdminPw').value;
        const cPw = document.getElementById('confirmAdminPw').value;
        if (cur.length !== 6 || isNaN(cur)) { alert('현재 비밀번호 6자리를 정확히 입력하세요.'); return; }
        if (nPw.length !== 6 || isNaN(nPw)) { alert('새 비밀번호는 숫자 6자리여야 합니다.'); return; }
        if (nPw !== cPw) { alert('새 비밀번호 확인이 일치하지 않습니다.'); return; }
        try {
            await auth.signInWithEmailAndPassword(ADMIN_EMAIL, cur);
            await auth.currentUser.updatePassword(nPw);
            alert('비밀번호가 안전하게 변경되었습니다. (모든 교무실 공통 적용)');
            document.getElementById('currentAdminPw').value = "";
            document.getElementById('newAdminPw').value = "";
            document.getElementById('confirmAdminPw').value = "";
        } catch (err) {
            if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') alert('현재 비밀번호가 일치하지 않습니다.');
            else alert('오류가 발생했습니다: ' + err.message);
        }
    }
</script>
