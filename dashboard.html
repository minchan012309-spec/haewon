<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호출 대시보드 - 선생님용</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" type="text/css"/>
    <style>
        * { font-family: 'Paperlogy', sans-serif !important; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8fafc; padding: 40px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #startLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .start-btn { background: #2563eb; color: white; padding: 25px 60px; border-radius: 20px; font-size: 2rem; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 10px 30px rgba(37,99,235,0.3); }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; }
        
        .alert-card { background: white; border-radius: 40px; padding: 50px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.1); display: none; flex: 1; margin-bottom: 20px; border: 3px solid #2563eb; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .alert-card.active { display: flex; gap: 40px; align-items: center; text-align: left; }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .alert-left { flex: 1.2; display: flex; flex-direction: column; justify-content: center; }
        .alert-right { flex: 0.8; display: flex; justify-content: center; align-items: center; background: #f1f5f9; height: 100%; border-radius: 30px; overflow: hidden; border: 2px solid #e2e8f0; min-height: 380px; }
        
        .student-photo { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
        .no-photo-text { color: #94a3b8; font-size: 1.5rem; font-weight: bold; text-align: center; }

        .t-name { font-size: 4.5rem; font-weight: 900; color: #0f172a; margin: 15px 0; }
        .info-box { background: #f1f5f9; padding: 35px; border-radius: 30px; font-size: 2.8rem; font-weight: bold; line-height: 1.4; margin-bottom: 20px; }
        
        /* 🚨 [추가] 부재중 버튼 디자인 */
        .absent-btn { background: #dc2626; color: white; padding: 20px; border-radius: 20px; font-size: 1.8rem; font-weight: bold; border: none; cursor: pointer; width: 100%; text-align: center; box-shadow: 0 5px 15px rgba(220,38,38,0.3); transition: background 0.2s; }
        .absent-btn:hover { background: #b91c1c; }

        .history-item { background: white; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 1.2rem; font-weight: bold; color: #334155; border-left: 5px solid #cbd5e0; }
    </style>
</head>
<body>
<div id="startLayer">
    <button class="start-btn" onclick="initSystem()">수신 시작하기</button>
</div>
<div class="header">
    <div style="color:#2563eb; font-weight:bold; font-size:1.5rem;">● 실시간 모니터링 중</div>
    <div id="clock" style="font-size:1.5rem;">00:00:00</div>
</div>
<div id="empty" style="flex:1; display:flex; justify-content:center; align-items:center; font-size:2rem; color:#cbd5e0;">대기 중...</div>

<div class="alert-card" id="card">
    <div class="alert-left">
        <div style="color:#2563eb; font-size:1.5rem; font-weight:bold;">지금 호출한 선생님</div>
        <div class="t-name" id="tName">---</div>
        <div class="info-box"><span id="sInfo">학번 성함</span><br><span id="sPurp" style="color:#2563eb;">목적</span></div>
        <button class="absent-btn" id="absentBtn">선생님 부재중 전송</button>
    </div>
    <div class="alert-right">
        <div class="no-photo-text" id="photoFallback">사진 없음</div>
        <img class="student-photo" id="studentImg" src="" alt="학생 사진">
    </div>
</div>

<div id="historyList" style="margin-top:20px;"></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzceRMZQbhlKGkLxM1yxCNRJ61HKOs0HbxAe7RXCeRjbw05gJoTnmm6UdW2xB-9rzoh9g/exec";
    let lastTime = Date.now(), historyList = [];
    let koVoice = null, currentCallData = null, autoCloseTimer = null;

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
    setInterval(updateClock, 1000);

    function getBestKoVoice() {
        if (!('speechSynthesis' in window)) return;
        const voices = window.speechSynthesis.getVoices();
        koVoice = voices.find(v => v.lang.includes('ko') && v.name.includes('Google')) || 
                  voices.find(v => v.lang.includes('ko') && v.name.includes('Natural')) ||
                  voices.find(v => v.lang.includes('ko'));
    }
    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = getBestKoVoice;
        getBestKoVoice();
    }

    async function initSystem() {
        document.getElementById('startLayer').style.display = 'none';
        getBestKoVoice();
        
        const initialSilent = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');
        initialSilent.volume = 0;
        initialSilent.play().catch(e => console.log(e));

        try {
            const res = await fetch(`${GAS_URL}?type=latest&v=${Date.now()}`);
            const d = await res.json();
            if(d && d.timestamp) lastTime = Number(d.timestamp);
        } catch(e) { lastTime = Date.now(); }
        
        checkCallDynamic(); 
    }

    async function checkCallDynamic() {
        try {
            const res = await fetch(`${GAS_URL}?type=latest&v=${Date.now()}`);
            const d = await res.json();
            if(d && d.timestamp && Number(d.timestamp) > lastTime) {
                lastTime = Number(d.timestamp);
                notify(d);
            }
        } catch(e) { console.log("조회 대기 중..."); }
        setTimeout(checkCallDynamic, 400); 
    }

    function notify(d) {
        currentCallData = d;
        clearTimeout(autoCloseTimer);
        
        document.getElementById('empty').style.display = 'none';
        const card = document.getElementById('card');
        const imgTag = document.getElementById('studentImg');
        const fallbackText = document.getElementById('photoFallback');
        
        document.getElementById('tName').innerText = d.teacher + " 선생님";
        document.getElementById('sInfo').innerText = d.id + " " + d.name;
        document.getElementById('sPurp').innerText = d.purpose;
        
        if(d.image && d.image.trim().length > 10) {
            imgTag.src = "data:image/jpeg;base64," + d.image;
            imgTag.style.display = "block";
            fallbackText.style.display = "none";
        } else {
            imgTag.src = ""; imgTag.style.display = "none"; fallbackText.style.display = "block";
        }
        
        card.style.display = "flex"; 
        card.classList.add('active');

        // 알림 비프음
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const playTone = (freq, startTime, duration) => {
                const gainNode = ctx.createGain();
                const osc1 = ctx.createOscillator(); osc1.type = 'triangle'; osc1.frequency.setValueAtTime(freq, startTime);
                const osc2 = ctx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.setValueAtTime(freq * 2, startTime);
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(1.0, startTime + 0.04);
                gainNode.gain.setValueAtTime(1.0, startTime + duration - 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc1.connect(gainNode); osc2.connect(gainNode); gainNode.connect(ctx.destination);
                osc1.start(startTime); osc2.start(startTime); osc1.stop(startTime + duration); osc2.stop(startTime + duration);
            };
            const now = ctx.currentTime;
            playTone(1318.51, now, 0.9); playTone(880.00, now + 0.25, 1.2);  
        } catch (e) { console.log(e); }

        // TTS 안내음성
        setTimeout(() => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const uttr = new SpeechSynthesisUtterance(`${d.teacher} 선생님, ${d.name} 학생이 ${d.purpose}로 호출했습니다.`);
                if(koVoice) uttr.voice = koVoice; 
                uttr.lang = 'ko-KR'; uttr.rate = 1.15; uttr.volume = 1.0; 
                window.speechSynthesis.speak(uttr);
            }
        }, 750);

        historyList.unshift(d); 
        if(historyList.length > 3) historyList.pop();
        document.getElementById('historyList').innerHTML = historyList.map(h => `<div class="history-item"><span>${h.id} ${h.name}</span><span>${h.purpose}</span></div>`).join('');

        // 🚨 부재중 버튼 클릭 리스너 연결
        document.getElementById('absentBtn').onclick = () => {
            clearTimeout(autoCloseTimer);
            sendAbsentSignal(d.teacher);
            closeCard();
        };

        // 10초 뒤 자동 닫힘 및 완료처리
        autoCloseTimer = setTimeout(() => { 
            closeCard();
            fetch(GAS_URL, {
                method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ type: "complete", id: d.id })
            }).catch(err => console.log(err));
        }, 10000);
    }

    function closeCard() {
        const card = document.getElementById('card');
        card.classList.remove('active'); 
        card.style.display = "none";
        document.getElementById('empty').style.display = 'flex'; 
    }

    // 💡 [추가] 부재중 처리 POST 전송 함수
    function sendAbsentSignal(teacherName) {
        fetch(GAS_URL, {
          method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ type: "absent", teacher: teacherName })
        }).catch(err => console.log(err));
    }
</script>
</body>
</html>
