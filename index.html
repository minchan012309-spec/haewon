<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교무실 학생 호출 패드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" type="text/css"/>
    <style>
        * { font-family: 'Paperlogy', sans-serif !important; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 30px; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        
        .container { background: white; width: 100%; max-width: 800px; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; }
        h1 { color: #1e3a8a; margin-bottom: 20px; font-size: 2.5rem; font-weight: 900; }
        p { color: #64748b; font-size: 1.2rem; margin-bottom: 30px; }
        
        /* 기존 입력 및 카메라 로직 디자인 생략 (민찬이 기존 UI에 맞춰 자유롭게 사용하면 돼) */
        .mock-app { font-size: 1.5rem; font-weight: bold; padding: 50px; background: #f8fafc; border-radius: 20px; border: 2px dashed #cbd5e0; margin-bottom: 20px; }
        
        /* 🚨 [추가] 부재중 팝업 전체 화면 오버레이 레이어 */
        #absentOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ef4444; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 40px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .absent-title { font-size: 4.5rem; font-weight: 900; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .absent-subtitle { font-size: 2.5rem; font-weight: bold; line-height: 1.5; opacity: 0.95; }
        
        /* 🏠 [추가] 고정형 플로팅 홈 버튼 스타일 */
        .home-btn { background: #1e293b; color: white; padding: 18px 35px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: all 0.2s; }
        .home-btn:hover { transform: translateY(-3px); background: #0f172a; }
        
        /* 부재중 레이어 안의 홈버튼 위치 고정 */
        .absent-home-pos { position: absolute; bottom: 50px; right: 50px; background: white !important; color: #ef4444 !important; font-size: 1.6rem !important; padding: 22px 45px !important; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h1>교무실 선생님 호출 시스템</h1>
    <p>정보를 입력하고 벨을 눌러 선생님을 호출하세요.</p>
    
    <div class="mock-app">벨 및 카메라 입력 패널 영역</div>
    
    <div style="position: absolute; bottom: 30px; right: 30px;">
        <button class="home-btn" onclick="resetToHome()">🏠 홈 화면</button>
    </div>
</div>

<div id="absentOverlay">
    <div class="absent-title">⚠️ 선생님 부재중</div>
    <div class="absent-subtitle" id="absentMsg">요청하신 선생님은<br>현재 자리에 계시지 않습니다.</div>
    
    <button class="home-btn absent-home-pos" onclick="resetToHome()">🏠 홈으로 돌아가기</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzceRMZQbhlKGkLxM1yxCNRJ61HKOs0HbxAe7RXCeRjbw05gJoTnmm6UdW2xB-9rzoh9g/exec";
    let lastAbsentTime = 0;
    let koVoice = null;

    // 한국어 TTS 보이스 장착
    function getBestKoVoice() {
        if (!('speechSynthesis' in window)) return;
        const voices = window.speechSynthesis.getVoices();
        koVoice = voices.find(v => v.lang.includes('ko') && v.name.includes('Google')) || 
                  voices.find(v => v.lang.includes('ko') && v.name.includes('Natural')) ||
                  voices.find(v => v.lang.includes('ko'));
    }
    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = getBestKoVoice;
        getBestKoVoice();
    }

    // 💡 부재중 신호 무한 반복 모니터링 루프 루틴 시작
    function startAbsentCheckLoop() {
        setInterval(async () => {
            try {
                const res = await fetch(`${GAS_URL}?type=check_absent&v=${Date.now()}`);
                const d = await res.json();
                
                if (d && d.type === "ABSENT_ALERT" && Number(d.timestamp) > lastAbsentTime) {
                    lastAbsentTime = Number(d.timestamp);
                    triggerAbsentScreen(d.teacher);
                }
            } catch(e) { console.log("체크 루프 대기..."); }
        }, 500); // 0.5초 주기로 기민하게 감지
    }
    window.onload = startAbsentCheckLoop;

    // 🚨 부재중 스크린 활성화 + 안내음성 표출
    function triggerAbsentScreen(teacherName) {
        const overlay = document.getElementById('absentOverlay');
        document.getElementById('absentMsg').innerHTML = `<span style="font-size:3.5rem; font-weight:900; background:rgba(0,0,0,0.2); padding:5px 15px; border-radius:10px;">${teacherName}</span> 선생님은<br>현재 부재중이십니다.`;
        overlay.style.display = "flex";

        // 부재중 경고 전용 사이렌 톤 이펙트 효과음
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const now = ctx.currentTime;
            const playAlert = (freq, time) => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.5, time + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(time); osc.stop(time + 0.4);
            };
            playAlert(523.25, now); playAlert(523.25, now + 0.15); // 도-도 더블 탭 비프
        } catch(e) {}

        // 부재중 인지용 전용 고속 고볼륨 TTS 안내 멘트 출력
        setTimeout(() => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(`${teacherName} 선생님은 현재 부재중이십니다.`);
                if(koVoice) uttr.voice = koVoice;
                uttr.lang = 'ko-KR'; uttr.rate = 1.1; uttr.volume = 1.0;
                window.speechSynthesis.speak(uttr);
            }
        }, 450);
    }

    // 🏠 홈 버튼 동작 기능 (리셋용)
    function resetToHome() {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        
        // 부재중 화면 숨기기
        document.getElementById('absentOverlay').style.display = "none";
        
        // 민찬이 폼 페이지에 들어있는 입력값 인풋태그 리셋 로직 필요 시 여기에 추가
        // 예: document.getElementById('studentIdInput').value = "";
        
        console.log("홈 화면으로 안전하게 초기화되었습니다.");
    }
</script>
</body>
</html>
