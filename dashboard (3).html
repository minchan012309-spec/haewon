<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호출 대시보드 - 선생님용</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" type="text/css"/>
    <style>
        * { font-family: 'Paperlogy', sans-serif !important; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8fafc; padding: 40px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #startLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 18px; }
        .start-btn { background: #2563eb; color: white; padding: 25px 60px; border-radius: 20px; font-size: 2rem; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 10px 30px rgba(37,99,235,0.3); }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center; }
        
        .alert-card { background: white; border-radius: 40px; padding: 60px; text-align: left; box-shadow: 0 30px 60px rgba(0,0,0,0.1); display: none; flex-direction: column; justify-content: center; flex: 1; margin-bottom: 20px; border: 3px solid #2563eb; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .alert-left { width: 100%; display: flex; flex-direction: column; justify-content: center; }
        .t-name { font-size: 5rem; font-weight: 900; color: #0f172a; margin: 20px 0; }
        .info-box { background: #f1f5f9; padding: 40px; border-radius: 30px; font-size: 3.2rem; font-weight: bold; line-height: 1.5; margin-bottom: 30px; }
        
        .absent-btn { background: #dc2626; color: white; padding: 22px; border-radius: 20px; font-size: 2rem; font-weight: bold; border: none; cursor: pointer; width: 100%; text-align: center; box-shadow: 0 5px 15px rgba(220,38,38,0.3); transition: background 0.2s; }
        .absent-btn:hover { background: #b91c1c; }

        .history-item { background: white; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 1.2rem; font-weight: bold; color: #334155; border-left: 5px solid #cbd5e0; }

        .toast-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -30%) scale(0.9);
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 30px 60px;
            border-radius: 28px;
            font-size: 2.2rem;
            font-weight: bold;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            z-index: 2000;
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 20px;
            white-space: nowrap;
        }
        .toast-container.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 방(교무실) 선택 게이트 */
        #roomGate { position: fixed; inset: 0; background: #f8fafc; z-index: 3000000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        #roomGate h1 { font-size: 1.8rem; margin-bottom: 8px; }
        #roomGate p { color: #64748b; margin-bottom: 30px; }
        .room-choice-btn { background: white; border: 2px solid #e2e8f0; padding: 26px 46px; border-radius: 18px; font-size: 1.4rem; font-weight: bold; color: #1e293b; cursor: pointer; width: 100%; max-width: 380px; margin-bottom: 14px; transition: 0.2s; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .room-choice-btn:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
        .room-tag { background: #eff6ff; color: #2563eb; font-weight: bold; padding: 6px 14px; border-radius: 10px; font-size: 1.1rem; }

        .dash-settings-btn { position: fixed; top: 20px; right: 20px; z-index: 1500; background: #f1f5f9; border: none; padding: 10px 16px; border-radius: 12px; font-weight: bold; color: #475569; cursor: pointer; font-size: 0.95rem; }
        .dash-settings-btn:hover { background: #e2e8f0; }

        #roomSwitchOverlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.75); z-index: 2500000; justify-content: center; align-items: center; padding: 30px; }
        .room-switch-box { background: white; border-radius: 24px; padding: 30px; max-width: 420px; width: 100%; text-align: center; }
        .cancel-btn { background: #f1f5f9; border: none; padding: 14px; border-radius: 14px; color: #475569; font-weight: bold; cursor: pointer; width: 100%; margin-top: 6px; }
        .cancel-btn:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<div id="roomGate">
    <h1>🏫 이 모니터는 어느 교무실인가요?</h1>
    <p>한 번만 선택하면 저장되어 다음부터 자동으로 이 교무실 알림만 표시됩니다.</p>
    <div id="roomChoiceList"></div>
</div>

<button class="dash-settings-btn" onclick="openRoomSwitchModal()">⚙️ 교무실 변경</button>
<div id="roomSwitchOverlay">
    <div class="room-switch-box">
        <h2 style="margin-bottom:6px; color:#1e293b;">교무실 변경</h2>
        <div class="subtitle" style="color:#64748b; margin-bottom:15px; font-size:0.95rem;">선택 즉시 이 화면이 새로고침됩니다.</div>
        <div id="roomSwitchList2"></div>
        <button class="cancel-btn" onclick="closeRoomSwitchModal()">취소</button>
    </div>
</div>

<div id="startLayer">
    <div class="room-tag" id="startRoomTag"></div>
    <button class="start-btn" onclick="initSystem()">수신 시작하기</button>
</div>
<div class="header">
    <div style="color:#2563eb; font-weight:bold; font-size:1.5rem;">● 실시간 모니터링 중 <span id="headerRoomTag" style="color:#0f172a;"></span></div>
    <div id="clock" style="font-size:1.5rem;">00:00:00</div>
</div>
<div id="empty" style="flex:1; display:flex; justify-content:center; align-items:center; font-size:2rem; color:#cbd5e0;">대기 중...</div>

<div class="alert-card" id="card">
    <div class="alert-left">
        <div style="color:#2563eb; font-size:1.8rem; font-weight:bold;">지금 호출한 선생님</div>
        <div class="t-name" id="tName">---</div>
        <div class="info-box"><span id="sInfo">학번 성함</span><br><span id="sPurp" style="color:#2563eb;">목적</span></div>
        <button class="absent-btn" id="absentBtn">선생님 부재중 전송</button>
    </div>
</div>

<div id="historyList" style="margin-top:20px;"></div>

<div id="toast" class="toast-container">
    <span style="color: #ef4444;">🚨</span> <span id="toastMessage">부재중 신호가 전송되었습니다.</span>
</div>

<!-- 🔥 파이어베이스 SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
    // ===================== 🔥 파이어베이스 설정 =====================
    const firebaseConfig = {
      apiKey: "AIzaSyC3Fc377RWFdwoEwBLd0YqEvmH35bFJKUI",
      authDomain: "teacher-calling-system-3ef78.firebaseapp.com",
      databaseURL: "https://teacher-calling-system-3ef78-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "teacher-calling-system-3ef78",
      storageBucket: "teacher-calling-system-3ef78.firebasestorage.app",
      messagingSenderId: "126407907843",
      appId: "1:126407907843:web:cfed783dadcb6ce8a48c36"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ===================== 🏫 교무실(방) 구분 =====================
    const ROOM_LIST = ["1학년 교무실", "2학년 교무실", "본교무실"];
    const urlParams = new URLSearchParams(window.location.search);
    let ROOM = urlParams.get('room') || localStorage.getItem('sys_saved_room_dashboard') || "";

    function renderRoomButtons(container, closeAfter) {
        container.innerHTML = "";
        ROOM_LIST.forEach(r => {
            const b = document.createElement('button');
            b.className = 'room-choice-btn';
            b.style.marginBottom = '10px';
            b.innerText = (r === ROOM ? '✅ ' : '') + r;
            b.onclick = () => {
                localStorage.setItem('sys_saved_room_dashboard', r);
                const url = new URL(window.location.href);
                url.searchParams.set('room', r);
                window.location.href = url.toString();
            };
            container.appendChild(b);
        });
    }

    if (!ROOM_LIST.includes(ROOM)) {
        document.getElementById('roomGate').style.display = 'flex';
        renderRoomButtons(document.getElementById('roomChoiceList'));
        throw new Error("ROOM_NOT_SELECTED");
    }
    localStorage.setItem('sys_saved_room_dashboard', ROOM);
    document.title = `호출 대시보드 - ${ROOM}`;
    document.getElementById('startRoomTag').innerText = "📍 " + ROOM;
    document.getElementById('headerRoomTag').innerText = "[" + ROOM + "]";

    function openRoomSwitchModal() {
        renderRoomButtons(document.getElementById('roomSwitchList2'));
        document.getElementById('roomSwitchOverlay').style.display = 'flex';
    }
    function closeRoomSwitchModal() {
        document.getElementById('roomSwitchOverlay').style.display = 'none';
    }

    let lastTime = 0, historyList = [];
    let koVoice = null, autoCloseTimer = null, toastTimer = null;
    let currentCall = null;

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
    setInterval(updateClock, 1000);

    function getBestKoVoice() {
        if (!('speechSynthesis' in window)) return;
        const voices = window.speechSynthesis.getVoices();
        koVoice = voices.find(v => v.lang.includes('ko') && v.name.includes('Google')) || 
                  voices.find(v => v.lang.includes('ko') && v.name.includes('Natural')) ||
                  voices.find(v => v.lang.includes('ko'));
    }
    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = getBestKoVoice;
        getBestKoVoice();
    }

    async function initSystem() {
        document.getElementById('startLayer').style.display = 'none';
        getBestKoVoice();
        
        const initialSilent = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');
        initialSilent.volume = 0;
        initialSilent.play().catch(e => console.log(e));

        try {
            const snap = await db.ref(`rooms/${ROOM}/latestCall`).once('value');
            const d = snap.val();
            lastTime = (d && d.timestamp) ? Number(d.timestamp) : Date.now();
        } catch(e) { lastTime = Date.now(); }

        db.ref(`rooms/${ROOM}/latestCall`).on('value', snap => {
            const d = snap.val();
            if (d && d.timestamp && Number(d.timestamp) > lastTime) {
                lastTime = Number(d.timestamp);
                notify(d);
            }
        });
    }

    function showToast(message) {
        clearTimeout(toastTimer);
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').innerText = message;
        
        toast.classList.add('show');
        
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    function notify(d) {
        if(!d || !d.name || !d.teacher) return;

        clearTimeout(autoCloseTimer);
        currentCall = d;
        
        document.getElementById('empty').style.display = 'none';
        const card = document.getElementById('card');
        
        document.getElementById('tName').innerText = d.teacher + " 선생님";
        document.getElementById('sInfo').innerText = d.id + " " + d.name;
        document.getElementById('sPurp').innerText = d.purpose;
        
        card.style.display = "flex"; 

        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(1200, now);
                
                gain1.gain.setValueAtTime(0, now);
                gain1.gain.linearRampToValueAtTime(1.4, now + 0.02);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                
                osc1.connect(gain1); gain1.connect(ctx.destination);
                osc1.start(now); osc1.stop(now + 0.6);

                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(880, now + 0.22);
                
                gain2.gain.setValueAtTime(0, now + 0.22);
                gain2.gain.linearRampToValueAtTime(1.4, now + 0.24);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
                
                osc2.connect(gain2); gain2.connect(ctx.destination);
                osc2.start(now + 0.22); osc2.stop(now + 0.9);
            }
        } catch (e) { console.log(e); }

        setTimeout(() => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const uttr = new SpeechSynthesisUtterance(`${d.teacher} 선생님, ${d.name} 학생이 호출했습니다.`);
                if(koVoice) uttr.voice = koVoice; 
                uttr.lang = 'ko-KR'; 
                uttr.rate = 1.05; 
                uttr.volume = 1.0; 
                window.speechSynthesis.speak(uttr);
            }
        }, 650);

        historyList.unshift(d); 
        if(historyList.length > 3) historyList.pop();
        document.getElementById('historyList').innerHTML = historyList.map(h => `<div class="history-item"><span>${h.id} ${h.name}</span><span>${h.purpose}</span></div>`).join('');

        document.getElementById('absentBtn').onclick = () => {
            clearTimeout(autoCloseTimer);
            sendAbsentSignal(d);
            showToast(`${d.teacher} 선생님 부재중 신호를 전송했습니다.`);
            closeCard();
        };

        // ⏱️ 기본 팝업 대기 시간: 30초 (30000ms)
        autoCloseTimer = setTimeout(() => { 
            closeCard();
            if (d.key) {
                db.ref(`rooms/${ROOM}/calls/${d.key}/status`).set("출력 완료").catch(err => console.log(err));
            }
        }, 30000); 
    }

    function closeCard() {
        const card = document.getElementById('card');
        card.style.display = "none";
        document.getElementById('empty').style.display = 'flex'; 
    }

    function sendAbsentSignal(d) {
        db.ref(`rooms/${ROOM}/absentSignal`).set({ teacher: d.teacher, timestamp: Date.now() }).catch(err => console.log(err));
        if (d.key) {
            db.ref(`rooms/${ROOM}/calls/${d.key}/status`).set("부재중 처리").catch(err => console.log(err));
        }
    }
</script>
</body>
</html>
